<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-shine" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF7D6" />
      <stop offset="20%" stop-color="#FCD34D" />
      <stop offset="40%" stop-color="#F59E0B" />
      <stop offset="60%" stop-color="#B45309" />
      <stop offset="80%" stop-color="#78350F" />
      <stop offset="100%" stop-color="#451a03" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode />
        <feMergeNode in="SourceGraphic" /> 
      </feMerge>
    </filter>
  </defs>
  
  <!-- Full Background for App Icon feel -->
  <rect width="512" height="512" rx="100" fill="url(#bg-grad)" />
  <rect width="512" height="512" rx="100" fill="url(#gold-shine)" fill-opacity="0.05" />
  
  <!-- Main Logo Centered -->
  <g transform="translate(0, 0)">
      <!-- Base Hexagon Background -->
      <path 
        d="M256 50L450 155V357L256 462L62 357V155L256 50Z" 
        fill="url(#bg-grad)" 
        stroke="url(#gold-shine)" 
        stroke-width="12"
        filter="url(#drop-shadow)"
      />
      
      <!-- Inner Geometric Shield -->
      <path 
        d="M256 90L400 170V342L256 422L112 342V170L256 90Z" 
        fill="#1f2937" 
        fill-opacity="0.5"
      />

      <!-- The "G" Gold Master Monogram - Abstract Diamond Shape -->
      <path 
        d="M256 140 L340 220 L256 340 L172 220 Z" 
        fill="url(#gold-shine)" 
        filter="url(#drop-shadow)"
      />
      
      <!-- Shine Accents -->
      <path d="M256 140 L290 220 L256 250 L222 220 Z" fill="#FFF" fill-opacity="0.4" />

      <!-- Side Accents -->
      <path d="M172 220 L130 220" stroke="url(#gold-shine)" stroke-width="6" stroke-linecap="round" />
      <path d="M340 220 L382 220" stroke="url(#gold-shine)" stroke-width="6" stroke-linecap="round" />
      <path d="M256 340 L256 390" stroke="url(#gold-shine)" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>