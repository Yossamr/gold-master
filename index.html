    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
      }

      html {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        height: 100dvh;
        background-color: #030712;
      }
      
      body {
        font-family: 'Cairo', sans-serif;
        background: radial-gradient(circle at top, #111827 0%, #030712 100%) !important;
        color: #f8fafc;
        user-select: none;
        -webkit-user-select: none;
        overscroll-behavior-y: none;
        height: 100dvh;
        padding-bottom: var(--sab);
        display: flex;
        flex-direction: column;
      }
      
      /* Global Mobile Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.01);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(251, 191, 36, 0.2);
        border-radius: 99px;
      }
      
      /* Mobile Optimizations */
      h1, h2, h3 { text-align: right; }
      input, select, textarea { font-size: 16px !important; }

      /* Key fix for keyboard visibility */
      input:focus, textarea:focus, select:focus {
        scroll-margin-bottom: 30vh;
      }

      .safe-pt { padding-top: var(--sat) !important; }
      .safe-pb { padding-bottom: var(--sab) !important; }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* ============================================
         GLOBAL SMOOTH TRANSITIONS & ANIMATIONS
         ============================================ */

      /* Keyframes */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(30px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.92); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }
      @keyframes floatY {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-6px); }
      }
      @keyframes goldGlow {
        0%, 100% { box-shadow: 0 0 10px rgba(251,191,36,0.2); }
        50%       { box-shadow: 0 0 28px rgba(251,191,36,0.55), 0 0 60px rgba(251,191,36,0.15); }
      }
      @keyframes spinSlow {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes liquidLoad {
        0%   { transform: translateY(100%); }
        100% { transform: translateY(-100%); }
      }
      @keyframes ripple {
        0%   { transform: scale(0); opacity: 0.6; }
        100% { transform: scale(4); opacity: 0; }
      }
      @keyframes blobPulse {
        0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        50%       { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
      }

      /* Page entry animation */
      .page-enter {
        animation: fadeInUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* Utility classes */
      .animate-scale-in  { animation: scaleIn  0.28s cubic-bezier(0.22, 1, 0.36, 1) both; }
      .animate-fade-in   { animation: fadeIn   0.4s  ease both; }
      .animate-float     { animation: floatY   3s    ease-in-out infinite; }
      .animate-gold-glow { animation: goldGlow 2.5s  ease-in-out infinite; }
      .animate-blob      { animation: blobPulse 8s ease-in-out infinite; }

      /* All interactive elements: smooth base transition */
      button, a, [role="button"], [tabindex], input, select, textarea, label {
        transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Buttons: scale + glow on tap */
      button:not(:disabled):active {
        transform: scale(0.96) !important;
      }
      button:not(:disabled):hover {
        filter: brightness(1.08);
      }

      /* Icons inherit transition from parent */
      svg {
        transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1),
                    color 0.22s ease,
                    opacity 0.22s ease;
      }

      /* Global master overrides for premium look */
      .bg-dark-card, [class*="bg-dark-card"], .bg-gray-800 {
        backdrop-filter: blur(16px) !important;
        -webkit-backdrop-filter: blur(16px) !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Premium Luxury Gold Buttons */
      .bg-gold-500, .bg-gold-600, .bg-\[\#f4c025\] {
        background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%) !important;
        color: #000 !important;
        font-weight: 800 !important;
        text-shadow: none !important;
        box-shadow: 0 4px 14px 0 rgba(251, 191, 36, 0.25) !important;
        border: none !important;
        transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1) !important;
      }
      .bg-gold-500:hover, .bg-gold-600:hover, .bg-\[\#f4c025\]:hover {
        background: linear-gradient(135deg, #fcd34d 0%, #fbbf24 100%) !important;
        box-shadow: 0 8px 24px 0 rgba(251, 191, 36, 0.45) !important;
        transform: translateY(-1px);
      }

      /* Inputs: glassmorphic & clearly visible */
      input[type="text"], input[type="number"], input[type="email"],
      input[type="password"], select, textarea {
        background: rgba(30, 41, 59, 0.85) !important;
        border: 1.5px solid rgba(255, 255, 255, 0.12) !important;
        border-radius: 12px !important;
        color: #ffffff !important;
        padding-top: 12px !important;
        padding-bottom: 12px !important;
        transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease !important;
      }
      input[type="text"]:focus, input[type="number"]:focus, input[type="email"]:focus,
      input[type="password"]:focus, select:focus, textarea:focus {
        border-color: rgba(251, 191, 36, 0.55) !important;
        background: rgba(30, 41, 59, 1) !important;
        box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.18) !important;
        outline: none !important;
      }

      /* Card hover shimmer */
      .card-hover {
        position: relative;
        overflow: hidden;
        transition: transform 0.3s cubic-bezier(0.4,0,0.2,1),
                    box-shadow 0.3s cubic-bezier(0.4,0,0.2,1);
      }
      .card-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 40px -8px rgba(0,0,0,0.5), 0 0 0 1px rgba(251,191,36,0.08);
      }

      /* Premium list dividers */
      .border-dark-border, .border-gray-700, [class*="border-white/5"] {
        border-color: rgba(255, 255, 255, 0.06) !important;
      }
      .divide-gray-700 > :not([hidden]) ~ :not([hidden]) {
        border-color: rgba(255, 255, 255, 0.06) !important;
      }

      /* Gold shimmer text effect */
      .text-shimmer {
        background: linear-gradient(90deg, #fbbf24, #fde68a, #fbbf24);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
      }

      /* Glass Bottom Dock */
      nav .bg-\[\#0f172a\]\/90 {
        background: rgba(15, 23, 42, 0.85) !important;
        backdrop-filter: blur(20px) !important;
        -webkit-backdrop-filter: blur(20px) !important;
        border-top: 1px solid rgba(255, 255, 255, 0.06) !important;
      }
    </style>
