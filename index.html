    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }

      html {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        height: 100%;
        background-color: #1f2937;
      }
      
      body {
        font-family: 'Cairo', sans-serif;
        background-color: #f3f4f6;
        color: #1f2937;
        user-select: none;
        -webkit-user-select: none;
        overscroll-behavior-y: none;
        min-height: 100%;
        padding-bottom: var(--sab);
      }
      
      /* Force Center Headers for Mobile Look */
      h1, h2, h3 {
          text-align: center;
      }
      
      /* Make inputs centered text by default for cleaner mobile look */
      input:not([type="checkbox"]):not([type="radio"]), select {
          text-align: center;
      }

      .dark body {
        background-color: #111827;
        color: #f3f4f6;
      }

      .safe-pt { padding-top: var(--sat) !important; }
      .safe-pb { padding-bottom: var(--sab) !important; }
      .safe-pl { padding-left: var(--sal) !important; }
      .safe-pr { padding-right: var(--sar) !important; }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
      
      @media screen and (max-width: 768px) {
        input, select, textarea {
          font-size: 16px !important; 
        }
      }

      .dark input[type="date"]::-webkit-calendar-picker-indicator {
          filter: invert(1);
      }
      @media print {
        .no-print { display: none !important; }
        .print-only { display: block !important; }
      }
    </style>
